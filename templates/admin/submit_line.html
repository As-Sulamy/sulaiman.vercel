{% load i18n admin_urls %}
<div class="submit-row">
    {% if show_save_and_add_another %}<input type="submit" value="{% trans 'Save and add another' %}" name="_addanother" class="bg-slate-700 text-slate-100 px-4 py-2 rounded-lg hover:bg-slate-600 transition-colors" />{% endif %}
    {% if show_save_and_continue %}<input type="submit" value="{% trans 'Save and continue editing' %}" name="_continue" class="bg-slate-700 text-slate-100 px-4 py-2 rounded-lg hover:bg-slate-600 transition-colors" />{% endif %}
    {% if show_save %}<input type="submit" value="{% trans 'Save' %}" class="bg-gradient-to-r from-sky-500 to-emerald-500 text-white px-6 py-2 rounded-lg font-semibold hover:shadow-lg hover:shadow-sky-500/25 transition-all" />{% endif %}
    {% if show_delete_link %}
        <p class="deletelink-box">
            <a href="{% url 'admin:projects_blog_delete' object_id %}" class="deletelink bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition-colors">{% trans "Delete" %}</a>
        </p>
    {% endif %}
</div>
